services:
  - type: web
    name: yaomarketplace-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        value: sqlite:///./booking_platform.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://yaomarketplace.vercel.app,https://yaomarketplace-git-main-pooranhari007-glitch.vercel.app
