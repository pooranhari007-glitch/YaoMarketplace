services:
  db:
    image: postgres:16-alpine
    container_name: direct-booking-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: direct_booking
    ports:
      - "5434:5432"
    volumes:
      - m1_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d direct_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  m1_pgdata:
